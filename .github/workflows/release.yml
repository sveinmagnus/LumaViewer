name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build plugin zip and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
          coverage: none

      - name: Install production Composer dependencies
        run: composer install --no-dev --prefer-dist --no-progress --optimize-autoloader

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build blocks
        run: |
          npm ci
          npm run build

      - name: Stage plugin files
        run: |
          mkdir -p dist/luma-viewer
          rsync -a --exclude-from=.distignore --exclude 'dist' ./ dist/luma-viewer/

      - name: Create zip
        run: |
          cd dist
          zip -r ../luma-viewer.zip luma-viewer

      - name: Publish release with zip asset
        uses: softprops/action-gh-release@v2
        with:
          files: luma-viewer.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
