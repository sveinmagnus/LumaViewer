name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  php-quality:
    name: PHP lint, static analysis, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHPCS (WordPress Coding Standards)
        run: composer run phpcs

      - name: PHPStan (static analysis)
        run: composer run phpstan

      - name: PHPUnit (unit tests)
        run: composer run test

  js-build:
    name: Block / asset build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm ci

      - name: Build blocks
        run: npm run build

      - name: Lint JS
        run: npm run lint:js --if-present
        continue-on-error: true

  e2e:
    name: E2E smoke (wp-env + Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
          coverage: none

      - name: Install production Composer dependencies
        run: composer install --no-dev --prefer-dist --no-progress --optimize-autoloader

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Build blocks
        run: |
          npm ci
          npm run build

      # wp-env (Docker) is reliable in CI, unlike booting the Playground CLI. It
      # mounts this repo as an active plugin on http://localhost:8888.
      - name: Start WordPress (wp-env)
        run: npx --yes @wordpress/env start

      - name: Seed the Events page
        run: |
          npx --yes @wordpress/env run cli wp rewrite structure '/%postname%/' --hard
          npx --yes @wordpress/env run cli wp post create \
            --post_type=page --post_title=Events --post_name=events \
            --post_status=publish "--post_content=[luma_calendar]"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          pip install -r tests/e2e/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run E2E smoke
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8888
        run: pytest -q tests/e2e

      - name: wp-env debug log on failure
        if: failure()
        run: npx --yes @wordpress/env run cli wp option get siteurl || true

  integration:
    name: WordPress integration tests (wp-env)
    # Manual: spins up the Docker-based wp-env test database and runs the
    # wp-phpunit integration suite. The plugin mount directory is derived at
    # runtime (see below), so it works regardless of the checkout folder name.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Start wp-env
        run: npx --yes @wordpress/env start

      - name: Run integration tests
        # wp-env mounts the checked-out repo at wp-content/plugins/<dir>, where
        # <dir> is the workspace basename (the repo name). Derive it so this stays
        # correct even if the repository/checkout folder is renamed.
        run: |
          plugin_dir="$(basename "$GITHUB_WORKSPACE")"
          npx --yes @wordpress/env run tests-cli \
            --env-cwd="wp-content/plugins/${plugin_dir}" \
            vendor/bin/phpunit -c phpunit-integration.xml.dist
